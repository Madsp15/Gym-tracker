name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish Gym-tracker/Gym-tracker.csproj -c Release -o publish

      # GitHub Pages serves project repos at /Gym-tracker/ — Blazor's base href must match.
      # Remove this step if you later add a custom domain (base href="/" will be correct again).
      - name: Fix base href for GitHub Pages subdirectory
        run: sed -i 's|<base href="/" />|<base href="/Gym-tracker/" />|g' publish/wwwroot/index.html

      # Copy AFTER the base href fix so 404.html also has the correct path
      - name: SPA 404 fallback
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Disable Jekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
