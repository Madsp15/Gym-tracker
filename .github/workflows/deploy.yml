name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # index.html uses href="/" for local dev.
      # Patch it to the GitHub Pages sub-path before building.
      - name: Patch base href for GitHub Pages
        run: |
          sed -i 's|<base href="/" />|<base href="/Gym-tracker/" />|' \
            Gym-tracker/wwwroot/index.html

      - name: Publish
        run: dotnet publish Gym-tracker/Gym-tracker.csproj -c Release -o publish

      # Disable Jekyll so GitHub Pages serves _framework/ correctly.
      - name: Disable Jekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
