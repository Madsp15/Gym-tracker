<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Gym Tracker</title>
    <script>
        // SPA redirect for GitHub Pages – encodes the deep-link URL into a query string
        // so that index.html can restore it before Blazor boots.
        // pathSegmentsToKeep = 1 preserves the /Gym-tracker sub-path prefix.
        (function () {
            var pathSegmentsToKeep = 1;
            var l = window.location;
            l.replace(
                l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
                l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
                (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                l.hash
            );
        })();
    </script>
</head>
<body></body>
</html>
